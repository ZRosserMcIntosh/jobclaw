<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — Cover Letter</title>
<style>
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'Space Grotesk';
    src: url('./fonts/space-grotesk-latin-ext.woff2') format('woff2');
    font-weight: 300 700;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
  }
  @font-face {
    font-family: 'DM Sans';
    src: url('./fonts/dm-sans-latin-ext.woff2') format('woff2');
    font-weight: 100 1000;
    font-style: normal;
    font-display: swap;
    unicode-range: U+0100-02AF, U+0304, U+0308, U+0329, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    font-size: 11.5px;
    line-height: 1.65;
    color: #1a1a2e;
    background: #ffffff;
    padding: 0;
    margin: 0;
  }

  .page {
    width: 100%;
    max-width: 8.5in;
    margin: 0 auto;
    padding: 0;
  }

  /* === HEADER === */
  .header {
    margin-bottom: 24px;
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a2e;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }

  .header-gradient {
    height: 2px;
    background: linear-gradient(to right, hsl(187, 74%, 32%), hsl(270, 70%, 45%));
    border-radius: 1px;
    margin-bottom: 8px;
  }

  .contact-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    color: #555;
  }

  .contact-row a {
    color: hsl(270, 70%, 45%);
    text-decoration: none;
  }

  .contact-row .separator {
    color: #ccc;
  }

  /* === DATE & ADDRESSEE === */
  .date {
    font-size: 10.5px;
    color: #777;
    margin-bottom: 20px;
  }

  .addressee {
    font-size: 11.5px;
    font-weight: 500;
    color: #333;
    margin-bottom: 16px;
  }

  /* === BODY === */
  .body p {
    margin-bottom: 12px;
    font-size: 11.5px;
    line-height: 1.7;
    color: #333;
  }

  .body p:first-child {
    color: #1a1a2e;
  }

  .body .section-label {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: hsl(187, 74%, 32%);
    margin-top: 16px;
    margin-bottom: 6px;
  }

  .body ul {
    padding-left: 20px;
    margin-bottom: 12px;
  }

  .body li {
    font-size: 11px;
    line-height: 1.6;
    color: #444;
    margin-bottom: 3px;
  }

  .body li strong {
    font-weight: 600;
    color: #333;
  }

  /* === CLOSING === */
  .closing {
    margin-top: 20px;
  }

  .closing p {
    font-size: 11.5px;
    color: #333;
    margin-bottom: 4px;
  }

  .closing .signature-img {
    display: block;
    height: 52px;
    width: auto;
    margin-top: 14px;
    margin-bottom: 2px;
    margin-left: -6px;
  }

  .closing .signature {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: #1a1a2e;
    margin-top: 0;
  }

  /* === PRINT === */
  @media print {
    body {
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .page {
      padding: 0;
    }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="header-gradient"></div>
    <div class="contact-row">
      <span>{{EMAIL}}</span>
      <span class="separator">|</span>
      <span>{{PHONE}}</span>
      <span class="separator">|</span>
      <span>WhatsApp: {{WHATSAPP}}</span>
      <span class="separator">|</span>
      <a href="https://{{LINKEDIN}}">{{LINKEDIN}}</a>
      <span class="separator">|</span>
      <a href="https://{{GITHUB}}">{{GITHUB}}</a>
      <span class="separator">|</span>
      <a href="https://{{PORTFOLIO}}">{{PORTFOLIO}}</a>
    </div>
  </div>

  <!-- DATE -->
  <div class="date">{{DATE}}</div>

  <!-- ADDRESSEE -->
  <div class="addressee">{{ADDRESSEE}}</div>

  <!-- BODY -->
  <div class="body">
    {{BODY}}
  </div>

  <!-- CLOSING -->
  <div class="closing">
    {{CLOSING}}
    <img class="signature-img" src="{{SIGNATURE_DATA_URI}}" alt="Signature" />
    <div class="signature">{{NAME}}</div>
  </div>

</div>
</body>
</html>
